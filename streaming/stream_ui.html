<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ Charlie 2.0 — Stream</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;color:#e6edf3;font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#00d4ff;}
.pvdr-tag{margin-left:auto;padding:2px 10px;background:#21262d;border:1px solid #30363d;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#00d4ff;}
.stream-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.stream-area::-webkit-scrollbar{width:4px;}
.stream-area::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px;}
.msg-user{background:linear-gradient(135deg,#1a3a4a,#0d2233);border-radius:14px 2px 14px 14px;padding:12px 16px;max-width:75%;align-self:flex-end;font-size:13px;line-height:1.6;}
.msg-ai{background:#161b22;border:1px solid #30363d;border-radius:2px 14px 14px 14px;padding:12px 16px;max-width:85%;align-self:flex-start;font-size:13px;line-height:1.7;white-space:pre-wrap;}
.msg-meta{font-size:9px;font-family:'JetBrains Mono',monospace;color:#8b949e;margin-top:4px;}
.cursor{display:inline-block;width:2px;height:14px;background:#00d4ff;animation:blink .7s infinite;vertical-align:middle;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.gov-bar{background:#0d2010;border:1px solid #3fb95020;border-radius:6px;padding:6px 10px;font-size:9px;font-family:'JetBrains Mono',monospace;color:#3fb950;margin-top:6px;}
.input-row{background:#161b22;border-top:1px solid #30363d;padding:12px 16px;display:flex;gap:10px;align-items:flex-end;}
.input-wrap{flex:1;background:#21262d;border:1px solid #30363d;border-radius:10px;display:flex;transition:border-color .2s;}
.input-wrap:focus-within{border-color:#00d4ff;}
#prompt{background:none;border:none;outline:none;color:#e6edf3;font-size:14px;padding:10px 12px;width:100%;resize:none;font-family:'Inter',sans-serif;max-height:100px;line-height:1.5;}
#prompt::placeholder{color:#8b949e;}
.send-btn{width:44px;height:44px;border-radius:10px;background:#00d4ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;}
.pvdr-row{display:flex;gap:6px;padding:8px 16px;background:#161b22;border-bottom:1px solid #30363d;overflow-x:auto;}
.pvdr-row::-webkit-scrollbar{display:none;}
.pvdr{padding:3px 10px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;border:1px solid #30363d;background:#21262d;color:#8b949e;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pvdr:hover,.pvdr.active{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,.08);}
.tok-count{font-size:9px;font-family:'JetBrains Mono',monospace;color:#8b949e;margin-left:auto;align-self:center;}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge{padding:1px 6px;border-radius:10px;font-size:8px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.badge.s{background:#2a1a3a;color:#a371f7;border:1px solid #a371f730;}
.badge.g{background:#1a3a1a;color:#3fb950;border:1px solid #3fb95030;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#8b949e;}
.empty-icon{font-size:48px;}
.empty-text{font-size:12px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="header">
  <div class="dot" id="dot"></div>
  <span class="title">⚡ CHARLIE 2.0 STREAM</span>
  <span class="pvdr-tag" id="pvdr-tag">connecting...</span>
</div>
<div class="pvdr-row">
  <div class="pvdr active" onclick="setP('auto',this)">⚡ Auto</div>
  <div class="pvdr" onclick="setP('ollama',this)">🧠 Ollama</div>
  <div class="pvdr" onclick="setP('anthropic',this)">◆ Claude</div>
  <div class="pvdr" onclick="setP('openai',this)">◎ GPT</div>
  <span class="tok-count" id="tok">0 tokens</span>
</div>
<div class="stream-area" id="msgs">
  <div class="empty" id="empty">
    <div class="empty-icon">⚡</div>
    <div class="empty-text">Charlie 2.0 — Streaming Mode</div>
    <div style="font-size:10px;font-family:'JetBrains Mono',monospace">Real-time token streaming · Sovereign · Governed</div>
  </div>
</div>
<div class="input-row">
  <div class="input-wrap">
    <textarea id="prompt" rows="1" placeholder="Stream with Charlie 2.0..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
  </div>
  <button class="send-btn" id="sbtn" onclick="send()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>
<script>
const API='http://127.0.0.1:8000';
let provider='auto',streaming=false,totalTok=0;
function setP(p,el){provider=p;document.querySelectorAll('.pvdr').forEach(e=>e.classList.remove('active'));el.classList.add('active');}
function addMsg(role,text){
  const e=document.getElementById('empty');if(e)e.remove();
  const a=document.getElementById('msgs'),d=document.createElement('div');
  d.className=role==='user'?'msg-user':'msg-ai';
  if(role==='ai'){d.id='cur-ai';const b=document.createElement('div');b.className='badges';b.innerHTML='<span class="badge s">STREAMING</span><span class="badge g">GOVERNED</span>';d.appendChild(b);}
  else{d.textContent=text;}
  a.appendChild(d);a.scrollTop=a.scrollHeight;return d;
}
function addCursor(){const m=document.getElementById('cur-ai');if(m){const c=document.createElement('span');c.className='cursor';c.id='cur';m.insertBefore(c,m.firstChild);}}
function remCursor(){const c=document.getElementById('cur');if(c)c.remove();}
async function send(){
  if(streaming)return;
  const inp=document.getElementById('prompt'),p=inp.value.trim();
  if(!p)return;inp.value='';inp.style.height='auto';
  document.getElementById('sbtn').disabled=true;streaming=true;
  addMsg('user',p);
  const aiDiv=addMsg('ai','');
  const tn=document.createTextNode('');
  aiDiv.insertBefore(tn,aiDiv.querySelector('.badges'));
  addCursor();
  let full='',tok=0;
  try{
    const res=await fetch(`${API}/ai/stream`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,provider})});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const reader=res.body.getReader(),dec=new TextDecoder();
    while(true){
      const{done,value}=await reader.read();if(done)break;
      const lines=dec.decode(value).split('\n');
      for(const line of lines){
        if(line.startsWith('data: ')){
          try{
            const d=JSON.parse(line.slice(6));
            if(d.token){full+=d.token;tn.textContent=full;tok++;totalTok++;document.getElementById('tok').textContent=`${totalTok} tokens`;document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;}
            if(d.provider)document.getElementById('pvdr-tag').textContent=d.provider;
            if(d.event==='done'){const g=document.createElement('div');g.className='gov-bar';g.textContent=`⚖️ Governed · ${d.provider||provider} · ${tok} tokens · hash:${d.governance_hash||'sealed'}`;aiDiv.appendChild(g);}
          }catch{}
        }
      }
    }
  }catch(e){
    try{const r=await fetch(`${API}/ai/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,provider})});const d=await r.json();full=d.response||'No response';tn.textContent=full;document.getElementById('pvdr-tag').textContent=d.provider||provider;}
    catch(e2){tn.textContent=`Error: ${e}`;}
  }
  remCursor();streaming=false;document.getElementById('sbtn').disabled=false;
}
async function ping(){
  try{const r=await fetch(`${API}/health`,{signal:AbortSignal.timeout(3000)});const d=await r.json();const dot=document.getElementById('dot');
  if(d.status==='OK'){dot.style.background='#3fb950';dot.style.boxShadow='0 0 6px #3fb950';document.getElementById('pvdr-tag').textContent=provider;}
  }catch{document.getElementById('dot').style.background='#f85149';}
}
setInterval(ping,8000);ping();
</script>
</body>
</html>
